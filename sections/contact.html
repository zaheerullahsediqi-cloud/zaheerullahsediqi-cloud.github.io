<section class="contact" id="contact">
  <div class="wrap contact-grid">
    <div class="contact-info">
      <span class="section-tag">Get in touch</span>
      <h2>Send us your requirement.</h2>
      <p>Attach a solicitation, a parts list, or just describe what you need — we'll follow up with a quote and timeline.</p>
      <div class="contact-detail">
        <div>
          <span class="label">Email</span>
          info@kohinoorsuppliers.com
        </div>
        <div>
          <span class="label">Phone</span>
          [Insert Phone Number]
        </div>
        <div>
          <span class="label">Location</span>
          San Antonio, TX
        </div>
      </div>
    </div>
    <form class="rfq" id="rfq-form">
      <div class="form-row">
        <div class="form-field">
          <label for="name">Name</label>
          <input id="name" name="from_name" type="text" placeholder="Your name" required>
        </div>
        <div class="form-field">
          <label for="org">Organization</label>
          <input id="org" name="org" type="text" placeholder="Agency or company">
        </div>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label for="email">Email</label>
          <input id="email" name="reply_to" type="email" placeholder="you@agency.gov" required>
        </div>
        <div class="form-field">
          <label for="phone">Phone</label>
          <input id="phone" name="phone" type="tel" placeholder="(000) 000-0000">
        </div>
      </div>
      <div class="form-row">
        <div class="form-field full">
          <label for="details">What do you need?</label>
          <textarea id="details" name="message" placeholder="Describe the requirement or paste a solicitation number..." required></textarea>
        </div>
      </div>
      <input type="hidden" name="to_email" value="khanzadran797@gmail.com">
      <button type="submit" class="btn btn-primary" id="rfq-submit">Send Request</button>
      <p id="rfq-status" class="rfq-status" role="status" aria-live="polite"></p>
    </form>
  </div>
</section>
